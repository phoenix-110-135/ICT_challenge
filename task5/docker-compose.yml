services:

  db:
    image: postgres:16-alpine

    container_name: warehouse_db

    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./warehouse_routing.sql:/docker-entrypoint-initdb.d/warehouse_routing.sql:ro

    ports:
      - "5432:5432"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER} -d ${DB_NAME}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: warehouse_backend

    restart: unless-stopped

    env_file:
      - .env

    environment:
      DB_HOST: db
      DB_PORT: 5432

    volumes:
      - ./backend:/app
      - static_files:/app/staticfiles

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: warehouse_frontend

    restart: unless-stopped

    ports:
      - "5500:80"

    depends_on:
      - backend


volumes:
  postgres_data:
  static_files: