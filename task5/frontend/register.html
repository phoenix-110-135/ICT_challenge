<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        ثبت‌نام | سیستم هوشمند مسیریابی سفارش
    </title>

    <style>

        * {
            box-sizing: border-box;
        }

        body {

            margin: 0;

            min-height: 100vh;

            display: flex;

            align-items: center;

            justify-content: center;

            padding: 20px;

            font-family:
                Tahoma,
                Arial,
                sans-serif;

            background:
                radial-gradient(
                    circle at top right,
                    #172554,
                    #020617 55%
                );

            color: #f8fafc;

        }

        .auth-container {

            width: min(
                460px,
                100%
            );

        }

        .auth-card {

            padding: 35px;

            border-radius: 25px;

            background:
                rgba(
                    15,
                    23,
                    42,
                    0.92
                );

            border: 1px solid
                rgba(
                    148,
                    163,
                    184,
                    0.18
                );

            box-shadow:
                0 25px 80px
                rgba(
                    0,
                    0,
                    0,
                    0.4
                );

            backdrop-filter:
                blur(15px);

        }

        .logo {

            width: 65px;

            height: 65px;

            display: flex;

            align-items: center;

            justify-content: center;

            margin: 0 auto 20px;

            border-radius: 20px;

            font-size: 30px;

            background:
                linear-gradient(
                    135deg,
                    #2563eb,
                    #7c3aed
                );

        }

        h1 {

            margin: 0 0 10px;

            text-align: center;

            font-size: 27px;

        }

        .description {

            margin-bottom: 30px;

            text-align: center;

            color: #94a3b8;

            line-height: 2;

            font-size: 14px;

        }

        .field {

            margin-bottom: 18px;

        }

        label {

            display: block;

            margin-bottom: 8px;

            color: #cbd5e1;

            font-size: 14px;

        }

        input {

            width: 100%;

            padding: 14px 16px;

            color: white;

            background:
                rgba(
                    2,
                    6,
                    23,
                    0.8
                );

            border: 1px solid
                #334155;

            border-radius: 12px;

            outline: none;

            font-family: inherit;

            font-size: 15px;

            transition: 0.2s;

        }

        input:focus {

            border-color:
                #3b82f6;

            box-shadow:
                0 0 0 3px
                rgba(
                    59,
                    130,
                    246,
                    0.15
                );

        }

        button {

            width: 100%;

            padding: 15px;

            margin-top: 10px;

            border: none;

            border-radius: 12px;

            color: white;

            background:
                linear-gradient(
                    135deg,
                    #2563eb,
                    #7c3aed
                );

            font-family: inherit;

            font-weight: bold;

            font-size: 16px;

            cursor: pointer;

            transition: 0.2s;

        }

        button:hover {

            transform:
                translateY(-2px);

        }

        button:disabled {

            opacity: 0.5;

            cursor: not-allowed;

            transform: none;

        }

        .status {

            display: none;

            padding: 14px;

            margin-bottom: 20px;

            border-radius: 12px;

            line-height: 1.8;

            font-size: 14px;

        }

        .status.show {

            display: block;

        }

        .status.success {

            color: #bbf7d0;

            background:
                rgba(
                    22,
                    163,
                    74,
                    0.15
                );

            border: 1px solid
                rgba(
                    74,
                    222,
                    128,
                    0.3
                );

        }

        .status.error {

            color: #fecaca;

            background:
                rgba(
                    220,
                    38,
                    38,
                    0.15
                );

            border: 1px solid
                rgba(
                    248,
                    113,
                    113,
                    0.3
                );

        }

        .status.info {

            color: #bfdbfe;

            background:
                rgba(
                    30,
                    64,
                    175,
                    0.18
                );

            border: 1px solid
                rgba(
                    96,
                    165,
                    250,
                    0.3
                );

        }

        .bottom-link {

            margin-top: 22px;

            text-align: center;

            color: #94a3b8;

            font-size: 14px;

        }

        .bottom-link a {

            color: #60a5fa;

            text-decoration: none;

        }

    </style>

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="logo">
            📦
        </div>

        <h1>
            ایجاد حساب کاربری
        </h1>

        <div class="description">

            برای استفاده از سیستم هوشمند
            مسیریابی سفارش ثبت‌نام کنید.

        </div>

        <div
            id="status"
            class="status"
        ></div>

        <form
            id="registerForm"
        >

            <div class="field">

                <label>
                    نام کاربری
                </label>

                <input
                    id="username"
                    type="text"
                    required
                    placeholder="نام کاربری خود را وارد کنید"
                >

            </div>

            <div class="field">

                <label>
                    شماره موبایل
                </label>

                <input
                    id="phoneNumber"
                    type="tel"
                    required
                    placeholder="09123456789"
                >

            </div>

            <div class="field">

                <label>
                    رمز عبور
                </label>

                <input
                    id="password"
                    type="password"
                    required
                    placeholder="رمز عبور"
                >

            </div>

            <button
                id="registerButton"
                type="submit"
            >

                ثبت‌نام و دریافت کد تأیید

            </button>

        </form>

        <div class="bottom-link">

            قبلاً حساب ساخته‌اید؟

            <a href="login.html">
                ورود به حساب
            </a>

        </div>

    </div>

</div>

<script>

    const API_BASE_URL =
        "http://127.0.0.1:8000/api";


    function setStatus(
        message,
        type = "info"
    ) {

        const status =
            document.getElementById(
                "status"
            );

        status.className =
            `status show ${type}`;

        status.innerHTML =
            message;

    }


    document
        .getElementById(
            "registerForm"
        )
        .addEventListener(

            "submit",

            async function (
                event
            ) {

                event.preventDefault();


                const button =
                    document.getElementById(
                        "registerButton"
                    );


                button.disabled =
                    true;


                setStatus(
                    "در حال ایجاد حساب کاربری...",
                    "info"
                );


                const payload = {

                    username:
                        document
                            .getElementById(
                                "username"
                            )
                            .value
                            .trim(),

                    phone_number:
                        document
                            .getElementById(
                                "phoneNumber"
                            )
                            .value
                            .trim(),

                    password:
                        document
                            .getElementById(
                                "password"
                            )
                            .value

                };


                try {

                    const response =
                        await fetch(

                            `${API_BASE_URL}/users/register/`,

                            {

                                method:
                                    "POST",

                                headers: {

                                    "Content-Type":
                                        "application/json"

                                },

                                credentials:
                                    "include",

                                body:
                                    JSON.stringify(
                                        payload
                                    )

                            }

                        );


                    const data =
                        await response.json();


                    if (
                        !response.ok
                    ) {

                        throw data;

                    }


                    localStorage.setItem(

                        "pending_phone_number",

                        payload.phone_number

                    );


                    setStatus(

                        "کد تأیید با موفقیت ارسال شد. در حال انتقال...",

                        "success"

                    );


                    setTimeout(

                        function () {

                            window.location.href =
                                "verify.html";

                        },

                        1000

                    );

                }

                catch (
                    error
                ) {

                    console.error(
                        error
                    );


                    setStatus(

                        error.detail ||
                        error.message ||
                        JSON.stringify(
                            error
                        ),

                        "error"

                    );

                    button.disabled =
                        false;

                }

            }

        );

</script>

</body>

</html>
